<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For my bbyyy gurlll Vinita ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  font-family: 'Poppins', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Dim overlay */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0);
  z-index: 0;
  transition: background 2s ease;
}

.container {
  position: relative;
  z-index: 2;
  max-width: 700px;
  margin: 80px auto;
  padding: 40px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  transition: transform 0.2s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  text-align: center;
}

#typed-text::after {
  content: '|';
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.heart {
  text-align: center;
  font-size: 2rem;
  margin-top: 20px;
  cursor: pointer;
}

.slideshow img {
  width: 100%;
  display: none;
  border-radius: 15px;
}

.music-btn {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.surprise {
  display: none;
  margin-top: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div id="overlay"></div>

<audio id="bg-music" loop>
  <source src="palpal.mp3" type="audio/mp3">
</audio>

<div class="container" id="container">
  <h1>My bbyyy gurlll Vinita ❤️</h1>
  <button class="music-btn" onclick="startExperience()">🎵 Tap for surprise❤️</button>

  <div class="slideshow">
    <img src="photo1.jpg" class="slide" />
    <img src="photo2.jpg" class="slide" />
    <img src="photo3.jpg" class="slide" />
    <img src="photo4.jpg" class="slide" />
    <img src="photo5.jpg" class="slide" />
    <img src="photo6.jpg" class="slide" />
    <img src="photo7.jpg" class="slide" />
    <img src="photo8.jpg" class="slide" />
    <img src="photo9.jpg" class="slide" />
    <img src="photo10.jpg" class="slide" />
    <img src="photo11.jpg" class="slide" />
    <img src="photo12.jpg" class="slide" />
    <img src="photo13.jpg" class="slide" />
    <img src="photo14.jpg" class="slide" />
   
  </div>

  <div id="typed-text"></div>

  <div class="heart" onclick="showSurprise()">❤️</div>

  <div class="surprise" id="surprise">
    Vinita... you are my everything. Always ❤️ <br> I LOVE YOUUU...!!!!!!!🌹💞
  </div>
</div>

<script>
function startExperience() {
  document.getElementById("bg-music").play();
  document.getElementById("overlay").style.background = "rgba(0,0,0,0.6)";
}

// Typing
const text ='Vinita❤️,Pata nahi kaise shuru karun… jab jab main aapke liye likhne bethta hun na, words km pad jaate h aur feelings jyada ho jaati h. Shayad isliye kyunki aap mere liye sirf ek person nahi ho… aap meri aadat ho❤️, mera sukoon ho😌, meri duniya ho🌎.Kabhi kabhi lagta hai ki main itna lucky kaise ho gaya… ki aap meri life mein aayi🥹. Aapki hasi🫠, Aapki baatein🙂‍↔️, aapka simple sa “hmm” bhi mujhe itni khushi de deta hai ki main explain nahi kar sakta🌹.Aapse baat karte karte poora din kaise nikal jaata hai pata hi nahi chalta… aur jab aap thodi der ke liye bhi busy ho jaati ho na🥺, sach batau to sb kuch adhoora lagta hai. Jaise kuch missing ho🫠… jaise main khud hi incomplete hoon without you. I know me perfect nahi hu… aurr overthink bht karta hun😁, aurr thoda jyada possessive hun🙂… but sach ye hai ki main aapko lose karne ka thought bhi tolerate nahi kar sakta. Aap meri woh feeling ho jise main kabhi khona nahi chahta💞.Aapko pata hai, main future ke baare mein kuch bhi sochta hun n… hrr scene mein aap hoti ho. Chahe woh chhoti si coffee date ho, jisme hum coffee bhale hi fek de😂, ya ek simple walk from Vijaynagar stop to meghdoot garden🫶… ya phir hamari life ke bade dreams… sab mein sirf aap ho❣️.Mai promise nahi krta ki humari life perfect hogi… but itna jaroor promise krta hu ki har situation mein mai aapke saath khada rahunga. Aapki smile meri responsibility hai…🤌 aur aapka dukh meri problem.Vinita, I don’t just love you… main aapko feel karta hoon🥰. Aap meri har heartbeat mein ho💗, har thought me ho. Aur agar life mujhe ek hi chiz choose karne ka chance de… to me bina soche sirf aapko choose karunga hr janam me💞 .Bss ek baat yaad rakhna…No matter what happens, no matter how far we are in distance…I am always yours🥰. I love you💞😘, Vinita. ❤️ Iss sentence ke niche jo heart h usse tap kro ';


let i = 0;
(function type(){
  if(i<text.length){
    document.getElementById("typed-text").innerHTML += text.charAt(i);
    i++;
    setTimeout(type,40);
  }
})();

// Slideshow
let slideIndex=0;
const slides=document.getElementsByClassName("slide");
(function showSlides(){
  for(let s of slides) s.style.display="none";
  slideIndex=(slideIndex+1>slides.length)?1:slideIndex+1;
  slides[slideIndex-1].style.display="block";
  setTimeout(showSlides,3000);
})();

function showSurprise(){
  document.getElementById("surprise").style.display="block";
}

// Parallax effect
window.addEventListener("mousemove", e=>{
  const x=(window.innerWidth/2 - e.clientX)/30;
  const y=(window.innerHeight/2 - e.clientY)/30;
  document.getElementById("container").style.transform=`translate(${x}px,${y}px)`;
});

// Floating hearts particles
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let hearts=[];
for(let i=0;i<50;i++){
  hearts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*20+10,speed:Math.random()*1+0.5});
}

function drawHeart(x,y,size){
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size/2,x-size,y-size/2,x-size,y);
  ctx.bezierCurveTo(x-size,y+size/2,x,y+size,x,y+size*1.5);
  ctx.bezierCurveTo(x,y+size,x+size,y+size/2,x+size,y);
  ctx.bezierCurveTo(x+size,y-size/2,x,y-size/2,x,y);
  ctx.fillStyle="rgba(255,77,109,0.6)";
  ctx.fill();
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  hearts.forEach(h=>{
    drawHeart(h.x,h.y,h.size);
    h.y+=h.speed;
    if(h.y>canvas.height) h.y=0;
  });
  requestAnimationFrame(animate);
}
animate();

window.onresize=()=>{canvas.width=innerWidth;canvas.height=innerHeight};
</script>

</body>
</html>
